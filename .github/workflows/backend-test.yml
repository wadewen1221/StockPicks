name: Backend Test (Manual)

# 仅手动触发，用于 PR 之外的单独 Backend 验证
# 老板专用：今后调试后端时 workflow_dispatch 触发
on:
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python 版本'
        required: false
        default: '3.12'
        type: choice
        options:
          - '3.11'
          - '3.12'
          - '3.13'
      os:
        description: '操作系统'
        required: false
        default: 'ubuntu-latest'
        type: choice
        options:
          - ubuntu-latest
          - windows-latest

jobs:
  backend-test:
    name: Backend (${{ inputs.python_version }}, ${{ inputs.os }})
    runs-on: ${{ inputs.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run pytest
        env:
          STOCK_PICKS_DATA: /tmp/stock-picks-test-data
          STOCK_PICKS_FISCAL: /tmp/stock-picks-test-data/fiscal
          DEBUG: 'true'
          COOKIE_SECRET: test-cookie-secret-not-used
        run: |
          cd backend
          mkdir -p "$STOCK_PICKS_DATA/historical"
          mkdir -p "$STOCK_PICKS_FISCAL"
          python -m pytest tests/ -v --tb=long --color=yes