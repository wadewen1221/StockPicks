name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: |
          python -m pip install --upgrade pip
          pip install flake8 pyflakes
      - name: Run flake8 (best-effort)
        continue-on-error: true
        run: |
          cd backend
          flake8 selector/ config.py stock_selector.py --max-line-length=120 --ignore=E501,W503,E402,F401 --exclude=__pycache__,tests
      - name: Run pyflakes
        continue-on-error: true
        run: |
          cd backend
          pyflakes selector/ config.py stock_selector.py main.py

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: |
          python -m pip install --upgrade pip
          pip install mypy types-requests
      - name: Run mypy
        run: |
          cd backend
          mypy selector/ config.py stock_selector.py \
            --ignore-missing-imports \
            --no-strict-optional \
            --show-error-codes \
            --pretty

  docs-build:
    name: Docs Build (MkDocs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-material mkdocstrings[python] pymdown-extensions
      - name: Build docs site
        run: |
          mkdocs build --strict
