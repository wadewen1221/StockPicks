site_name: A股智能投资助手 V2
site_description: 4 套选股策略 + 17 项技术指标 + 基本面财务筛选
site_author: Stock Picks V2 Maintainer
site_url: https://StockPicks.github.io/

repo_name: StockPicks
repo_url: https://github.com/wadewen1221/StockPicks
edit_uri: edit/master/docs/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切换到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切换到浅色模式

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.caret
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search:
      lang: zh
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_signature_annotations: true
            separate_signature: true

nav:
  - 首页: index.md
  - 快速上手: getting-started.md
  - 选股策略:
      - 策略概览: strategies/overview.md
      - 短线策略: strategies/short-term.md
      - 中长线策略: strategies/mid-long-term.md
      - 综合策略: strategies/comprehensive.md
  - 技术指标:
      - 指标清单: indicators/list.md
      - RSRS 阻力支撑: indicators/rsrs.md
  - 部署运维:
      - 本地部署: deployment/local.md
      - Docker 部署: deployment/docker.md
      - 数据更新: deployment/data.md
  - 开发贡献:
      - 提 PR 流程: contributing/pr-guide.md
      - 本地开发: contributing/local-dev.md
      - 测试指南: contributing/testing.md
  - API 参考:
      - 后端 API: api/backend.md
      - 选股模块: api/selector.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/wadewen1221/StockPicks

